<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies Explorer - 电影产业的商业与口碑分析</title>
    <!-- 引入 Vega & Vega-Lite -->
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f7f9fc;
            color: #333;
        }
        .header {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            text-align: center;
        }
        .header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .header p {
            color: #7f8c8d;
            font-size: 1.1em;
            max-width: 800px;
            margin: 0 auto;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        #vis {
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Movies Explorer：口碑与商业的权衡</h1>
        <p>探索电影的烂番茄评分（口碑）、全球总票房（商业）、制作预算以及电影类型之间的关系。尝试<strong>框选 (Brush)</strong> 散点图中的区域，或者<strong>点击 (Click)</strong> 右侧柱状图的电影类型进行联动分析！</p>
    </div>

    <div class="container">
        <!-- 容器用于挂载 Vega-Lite 视图 -->
        <div id="vis"></div>
    </div>

    <script>
        const spec = {
            "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
            "title": "电影产业交互式可视化分析",
            "data": {
                "url": "https://raw.githubusercontent.com/vega/vega-datasets/master/data/movies.json"
            },
            "transform": [
                {"filter": "datum['Rotten Tomatoes Rating'] != null"},
                {"filter": "datum['Worldwide Gross'] > 0"},
                {"filter": "datum['Production Budget'] > 0"},
                {"filter": "datum['Major Genre'] != null"}
            ],
            "vconcat": [
                {
                    "hconcat": [
                        {
                            "title": "电影口碑与票房散点图 (可框选 / 缩放)",
                            "width": 600,
                            "height": 400,
                            "mark": {"type": "circle", "opacity": 0.6, "stroke": "white", "strokeWidth": 0.5},
                            "params": [
                                {
                                    "name": "brush",
                                    "select": "interval"
                                },
                                {
                                    "name": "grid",
                                    "select": "interval",
                                    "bind": "scales"
                                }
                            ],
                            "encoding": {
                                "x": {
                                    "field": "Rotten Tomatoes Rating",
                                    "type": "quantitative",
                                    "title": "烂番茄评分 (0-100)",
                                    "scale": {"domain": [0, 100]}
                                },
                                "y": {
                                    "field": "Worldwide Gross",
                                    "type": "quantitative",
                                    "title": "全球总票房 (对数)",
                                    "scale": {"type": "log"}
                                },
                                "size": {
                                    "field": "Production Budget",
                                    "type": "quantitative",
                                    "title": "制作预算 ($)",
                                    "scale": {"range": [10, 500]}
                                },
                                "color": {
                                    "condition": {
                                        "param": "click",
                                        "field": "Major Genre",
                                        "type": "nominal",
                                        "title": "电影类型",
                                        "scale": {"scheme": "category20"}
                                    },
                                    "value": "lightgray"
                                },
                                "opacity": {
                                    "condition": {
                                        "param": "brush",
                                        "value": 0.8
                                    },
                                    "value": 0.1
                                },
                                "tooltip": [
                                    {"field": "Title", "type": "nominal", "title": "电影名称"},
                                    {"field": "Major Genre", "type": "nominal", "title": "类型"},
                                    {"field": "Rotten Tomatoes Rating", "type": "quantitative", "title": "烂番茄评分"},
                                    {"field": "Worldwide Gross", "type": "quantitative", "format": "$,.0f", "title": "全球总票房"},
                                    {"field": "Production Budget", "type": "quantitative", "format": "$,.0f", "title": "制作预算"}
                                ]
                            }
                        },
                        {
                            "title": "选中区域内的电影类型分布 (可点击交叉过滤)",
                            "width": 250,
                            "height": 400,
                            "mark": "bar",
                            "params": [
                                {
                                    "name": "click",
                                    "select": {"type": "point", "encodings": ["color"]}
                                }
                            ],
                            "encoding": {
                                "y": {
                                    "field": "Major Genre",
                                    "type": "nominal",
                                    "sort": "-x",
                                    "title": null
                                },
                                "x": {
                                    "aggregate": "count",
                                    "title": "数量"
                                },
                                "color": {
                                    "condition": {
                                        "param": "click",
                                        "field": "Major Genre",
                                        "type": "nominal",
                                        "legend": null
                                    },
                                    "value": "lightgray"
                                },
                                "tooltip": [
                                    {"field": "Major Genre", "type": "nominal", "title": "类型"},
                                    {"aggregate": "count", "type": "quantitative", "title": "数量"}
                                ]
                            },
                            "transform": [
                                {"filter": {"param": "brush"}}
                            ]
                        }
                    ]
                },
                {
                    "title": "选中范围内的 Top 10 高票房电影",
                    "width": 880,
                    "height": 200,
                    "transform": [
                        {"filter": {"param": "brush"}},
                        {"filter": {"param": "click"}},
                        {
                            "window": [{"op": "rank", "as": "rank"}],
                            "sort": [{"field": "Worldwide Gross", "order": "descending"}]
                        },
                        {"filter": "datum.rank <= 10"}
                    ],
                    "mark": "bar",
                    "encoding": {
                        "x": {
                            "field": "Worldwide Gross",
                            "type": "quantitative",
                            "title": "全球总票房",
                            "axis": {"format": "$,.0f"}
                        },
                        "y": {
                            "field": "Title",
                            "type": "nominal",
                            "sort": {"field": "Worldwide Gross", "order": "descending"},
                            "title": null
                        },
                        "color": {
                            "field": "Major Genre",
                            "type": "nominal",
                            "legend": null
                        },
                        "tooltip": [
                            {"field": "Title", "type": "nominal", "title": "电影名称"},
                            {"field": "Worldwide Gross", "type": "quantitative", "format": "$,.0f", "title": "全球总票房"},
                            {"field": "Rotten Tomatoes Rating", "type": "quantitative", "title": "烂番茄评分"}
                        ]
                    }
                }
            ],
            "resolve": {
                "scale": {"color": "independent"}
            },
            "config": {
                "view": {"stroke": "transparent"},
                "axis": {"domainColor": "#ccc", "tickColor": "#ccc"}
            }
        };

        // 嵌入 Vega-Lite 图表
        vegaEmbed('#vis', spec, {actions: false}).then(result => {
            console.log("Visualization successfully loaded.");
        }).catch(console.error);
    </script>
</body>
</html>
