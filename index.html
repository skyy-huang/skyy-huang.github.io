<!DOCTYPE html>
<html>
<head>
  <title>全球财富DNA探索器</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
    .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
    h1 { text-align: center; font-weight: 800; color: #0f172a; margin-bottom: 10px; }
    .instruction { background: #eff6ff; border-left: 5px solid #3b82f6; padding: 15px; margin-bottom: 25px; font-size: 0.9em; line-height: 1.6; }
    #vis { width: 100%; min-height: 700px; }
    .footer { margin-top: 20px; font-size: 0.8em; color: #64748b; text-align: center; }
  </style>
</head>
<body>

  <div class="container">
    <h1>全球财富的代际流动与行业偏好</h1>
    
    <div class="instruction">
      <strong>高级探索操作：</strong><br>
      1. <strong>框选联动：</strong> 在上方散点图中，按住鼠标左键<strong>拖拽出一个矩形框</strong>；<br>
      2. <strong>过滤分析：</strong> 下方的行业统计和名单会自动过滤，仅显示你选中区域的富豪；<br>
      3. <strong>探索结论：</strong> 试着对比“美国”所在的高位区域和“德国”所在的区域，看看行业构成的巨大差异。
    </div>

    <div id="vis"></div>
    <div class="footer">数据来源: Forbes Billionaires 2023 (Verified) | 框架: Vega-Lite</div>
  </div>

  <script>
    // 使用 jsDelivr 镜像确保国内访问 100% 成功
    const dataSource = "https://cdn.jsdelivr.net/gh/FIT3179/Datasets@main/Billionaires_2023.csv";

    const spec = {
      "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
      "data": { "url": dataSource },
      "transform": [
        // 数据清洗：将字符串转换为数值以计算比例
        {"calculate": "datum.selfMade == 'TRUE' ? 1 : 0", "as": "isSelfMade"}
      ],
      "vconcat": [
        {
          "title": {"text": "1. 框选感兴趣的国家（国家富豪总数 vs 白手起家率）", "fontSize": 14, "anchor": "start"},
          "width": 850,
          "height": 300,
          "params": [{
            "name": "regionBrush",
            "select": {"type": "interval"}
          }],
          "layer": [
            {
              "transform": [
                {
                  "aggregate": [
                    {"op": "count", "as": "total_billionaires"},
                    {"op": "mean", "field": "isSelfMade", "as": "self_made_rate"}
                  ],
                  "groupby": ["country"]
                }
              ],
              "mark": {"type": "circle", "size": 150, "opacity": 0.8, "stroke": "white", "strokeWidth": 1},
              "encoding": {
                "x": {
                  "field": "total_billionaires", 
                  "type": "quantitative", 
                  "title": "国家富豪总数 (对数轴)",
                  "scale": {"type": "log", "domain": [1, 1000]}
                },
                "y": {
                  "field": "self_made_rate", 
                  "type": "quantitative", 
                  "title": "白手起家比例",
                  "axis": {"format": ".0%"},
                  "scale": {"domain": [-0.05, 1.05]}
                },
                "color": {
                  "condition": {"param": "regionBrush", "value": "#3b82f6"},
                  "value": "#cbd5e1"
                },
                "tooltip": [
                  {"field": "country", "title": "国家"},
                  {"field": "total_billionaires", "title": "富豪总数"},
                  {"field": "self_made_rate", "title": "自力更生率", "format": ".1%"}
                ]
              }
            }
          ]
        },
        {
          "hconcat": [
            {
              "title": {"text": "2. 选中区域的行业财富背景", "fontSize": 14, "anchor": "start"},
              "width": 400,
              "height": 300,
              "transform": [
                {"filter": {"param": "regionBrush"}}
              ],
              "mark": {"type": "bar", "tooltip": true},
              "encoding": {
                "y": {"field": "category", "type": "nominal", "title": null, "sort": "-x"},
                "x": {"aggregate": "count", "type": "quantitative", "title": "人数"},
                "color": {
                  "field": "selfMade", 
                  "type": "nominal", 
                  "title": "白手起家?",
                  "scale": {"range": ["#f97316", "#3b82f6"]}
                }
              }
            },
            {
              "title": {"text": "3. 区域顶级领袖 (Top 10)", "fontSize": 14, "anchor": "start"},
              "width": 300,
              "height": 300,
              "transform": [
                {"filter": {"param": "regionBrush"}},
                {"window": [{"op": "rank", "as": "rank"}], "sort": [{"field": "finalWorth", "order": "desc"}]},
                {"filter": "datum.rank <= 10"}
              ],
              "mark": {"type": "text", "align": "left", "baseline": "middle", "fontSize": 12, "dx": -120},
              "encoding": {
                "y": {"field": "rank", "type": "ordinal", "axis": null},
                "text": {"calculate": "datum.rank + '. ' + datum.personName + ' ($' + datum.finalWorth + 'B)'"}
              }
            }
          ]
        }
      ],
      "config": {
        "axis": {"grid": true, "gridColor": "#f1f5f9"},
        "view": {"stroke": "transparent"}
      }
    };

    // 渲染图表并添加错误提示
    vegaEmbed('#vis', spec, {"actions": false}).then(result => {
      console.log("可视化加载成功");
    }).catch(err => {
      console.error(err);
      document.getElementById('vis').innerHTML = 
        `<div style="color:red; padding:50px; text-align:center; border:1px solid red; border-radius:8px;">
           <h3>数据加载失败</h3>
           <p>可能是由于您的网络环境无法访问外部 CSV。请尝试刷新页面或切换网络环境。</p>
           <p><small>${err.message}</small></p>
         </div>`;
    });
  </script>
</body>
</html>
